[minio]
endpoint_url      = "http://minio:9000"
bucket_raw        = "raw-sales"
bucket_processed  = "processed-sales"

[generator]
default_rows    = 1000
lookback_days   = 30
max_customer_id = 500
max_qty         = 20

[generator.category_margins]
Electronics  = 0.72
Furniture    = 0.55
Software     = 0.18
Accessories  = 0.60

[generator.pricing]
Electronics  = [15.0,  1800.0]
Furniture    = [40.0,   900.0]
Software     = [9.99,   299.0]
Accessories  = [5.0,    120.0]

[generator.channels]
weights = { online = 55, retail = 30, partner = 15 }

[generator.payment_methods]
weights = { card = 50, invoice = 25, wallet = 15, crypto = 10 }

[generator.customer_tiers]
platinum = 20
gold     = 80
silver   = 200

[generator.products]
Electronics  = ["Laptop", "Monitor", "Keyboard", "Mouse", "Headset", "Webcam",
                "Tablet", "Smartphone", "Smartwatch", "Printer", "SSD", "RAM",
                "Graphics Card", "Microphone", "LED Strip"]
Furniture    = ["Desk", "Chair", "Bookshelf", "Filing Cabinet", "Standing Desk",
                "Monitor Arm", "Footrest", "Whiteboard"]
Software     = ["Antivirus", "Office Suite", "Design Tool", "Cloud Storage",
                "VPN License", "Password Manager", "Video Editor"]
Accessories  = ["USB Hub", "Charging Cable", "Laptop Bag", "Power Bank",
                "Screen Protector", "Docking Station", "Surge Protector",
                "Webcam Cover", "Cable Organiser"]

